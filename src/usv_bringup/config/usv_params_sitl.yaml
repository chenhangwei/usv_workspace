# =============================================================================
# USV SITL 仿真模式参数覆盖文件
# 
# 用法: 在 sitl_launch.py 中替换或追加到 usv_params.yaml
#       也可以手动运行时指定:
#       ros2 launch usv_bringup usv_launch.py \
#           simulation_mode:=sitl \
#           fcu_url:=tcp://127.0.0.1:5760 \
#           param_file:=/path/to/usv_params_sitl.yaml
#
# ⚠️ 注意: 此文件中的 gps_origin 必须与 SITL 启动位置一致！
# =============================================================================

# Auto Set Home 参数（SITL 中 GPS 立即收敛，缩短延迟）
/**/auto_set_home_node:
  ros__parameters:
    set_delay_sec: 3.0                      # SITL GPS 秒定位，3 秒足够
    use_current_gps: true                   # 使用 SITL 当前模拟 GPS 位置

# GPS 坐标转换（使用 SITL 默认 Canberra 位置）
# ⚠️ 如果你改了 SITL 启动位置，这里也要同步修改！
/**/gps_to_local_node:
  ros__parameters:
    gps_origin_lat: 22.5180977              # 与 SITL --custom-location 一致
    gps_origin_lon: 113.9007239             # 与 SITL --custom-location 一致
    gps_origin_alt: 0.0
    publish_rate: 10.0
    enable_gps_to_local: true
    coordinate_yaw_offset_deg: 0.0

/**/coord_transform_node:
  ros__parameters:
    gps_origin_lat: 22.5180977
    gps_origin_lon: 113.9007239
    gps_origin_alt: 0.0
    enable_coord_transform: true
    use_global_position_target: true

# =============================================================================
# SITL 仿真 MPC 速度控制器参数
# 
# v14: 与实船参数完全统一，AMPC 在线辨识自动适配仿真/实船差异
# 不再维护仿真专属 MPC 权重，避免仿真与实测行为不一致
#
# 调参记录 (SITL):
#   2026-02-08: 基于 nav_log 分析, 仿真专属参数 (R_w=20, R_dw=40, Q_cte=12)
#   2026-02-27 v14: 统一为实船参数 (R_w=60, R_dw=120, Q_cte=3)
#              AMPC 在线辨识 τ_omega 自动补偿仿真与实船动力学差异
# =============================================================================
/**/velocity_controller_node:
  ros__parameters:
    # MPC 权重参数 (v14: 与实船统一)
    mpc_weight_pos: 10.0                    # Q_pos: 位置权重
    mpc_weight_heading: 3.0                 # Q_theta: 航向权重 (v14: 8→3, 与实船统一)
    mpc_weight_steering: 60.0               # R_w: 转向惩罚 (v14: 20→60, 与实船统一)
    mpc_weight_steering_rate: 120.0         # R_dw: 转向速率惩罚 (v14: 40→120, 与实船统一)
    mpc_weight_cte: 3.0                     # Q_cte: 横向偏差权重 (v14: 12→3, 与实船统一)
    
    # v5 转向时间常数 (AMPC 会在线辨识, 此为初始值)
    mpc_tau_omega: 0.4                      # 基础 tau_omega (0.4s)
    
    # v6 速度自适应 tau_omega (v14: 与实船统一)
    adaptive_tau_enabled: true
    tau_omega_low_speed: 0.8                # 低速 tau (v14: 0.6→0.8, 与实船统一)
    tau_omega_high_speed: 0.4               # 高速 tau (v14: 0.3→0.4, 与实船统一)
    tau_speed_threshold_low: 0.20           # 低速阈值 (v14: 0.10→0.20, 与实船统一)
    tau_speed_threshold_high: 0.50          # 高速阈值 (v14: 0.30→0.50, 与实船统一)
    
    # 速度与角速度限制 (v14: 与实船统一)
    max_angular_velocity: 0.40              # w_max (v14: 0.5→0.40, 与实船统一)
    cruise_speed: 0.30                      # 巡航速度
    min_speed: 0.25                         # 最小速度 (v14: 0.15→0.25, 与实船统一)
    
    # v8 AMPC 参数 (v14: 与实船统一)
    ampc_enabled: true
    ampc_rls_forgetting_factor: 0.995       # RLS 遗忘因子 (v14: 0.99→0.995, 与实船统一)
    ampc_heading_observer_alpha: 0.08       # 航向滤波 (v14: 0.18→0.08, 与实船统一)
    ampc_tau_min: 0.30                      # τ 下限 (v14: 0.15→0.30, 与实船统一)
    ampc_tau_max: 1.5                       # τ 上限
    ampc_rebuild_threshold: 0.15            # τ 变化重建阈值
    ampc_saturation_tau_boost: 1.02         # 饱和升压因子

    # 分布式 APF（默认关闭，用于与纯MPC做 A/B 对照）
    apf_enabled: true                      # 是否启用 APF 融合层（true=叠加排斥修正，false=仅MPC）
    apf_use_fleet_neighbors_topic: true     # true=使用 GS 统一邻船话题；false=使用下方逐船话题列表
    apf_fleet_neighbors_topic: 'apf/neighbors'  # GS 统一下发邻船数据的话题（相对命名空间）
    apf_neighbor_pose_topics: []            # 兼容旧模式：逐船 Pose 话题列表（仅 apf_use_fleet_neighbors_topic=false 时生效）
    apf_safe_distance: 1.0                  # APF 生效半径 d0（米）
    apf_repulsion_gain: 0.7                 # 排斥增益 η（测试验证值）
    apf_lateral_to_yaw_gain: 1.2            # 横向排斥 → 角速度映射（测试验证值）
    apf_max_linear_correction: 0.20         # 线速度修正限幅（m/s）
    apf_max_angular_correction: 0.45        # 角速度修正限幅（rad/s）
    apf_neighbor_timeout: 0.8               # 邻船数据超时阈值（秒）
    apf_orca_enabled: true                  # 启用 ORCA 风格速度障碍修正（优先于传统 APF）
    apf_orca_time_horizon: 10.0             # ORCA 时间地平线 T（秒）
    apf_orca_min_separation: 1.0            # ORCA 最小分离距离（米）(v14: 2.0→1.0, 与实船统一)
    apf_orca_influence_distance: 8.0        # ORCA 邻船影响距离上限（米）
    # ---- 侧承诺（打破对称避让） ----
    apf_orca_side_commit_enabled: true      # 交汇时启用固定左右承诺
    apf_orca_commit_policy: starboard       # 对遇优先右舷规避（两船都向右转）
    apf_orca_side_commit_distance: 1.5      # 触发左右承诺距离（米）
    apf_orca_side_commit_hold_time: 2.5     # 左右承诺保持时间（秒）
    apf_orca_side_bias_lateral: 0.20        # 左右承诺附加转向偏置（rad/s）
    apf_orca_min_angular_near: 0.12         # 超近距最小角速度下限（rad/s）
    apf_orca_min_angular_distance: 0.7      # 触发最小角速度下限距离（米）
    apf_orca_near_apf_fallback_enabled: true  # 超近距叠加 APF 兜底
    apf_orca_near_apf_distance: 0.8         # APF 兜底触发距离（米）
    apf_orca_near_apf_weight: 1.0           # APF 兜底权重
    apf_orca_enforce_commit_direction: true  # 承诺生效时强约束最终角速度方向
    apf_orca_enforce_min_angular: 0.12      # 方向强约束最小角速度（rad/s）
    # ---- 共同转向（近距双边分担） ----
    apf_orca_shared_turn_enabled: true      # 近距时双方都承担最小转向份额
    apf_orca_shared_turn_distance: 1.2      # 双边分担触发距离（米）
    apf_orca_shared_turn_min_angular: 0.24  # 双边分担最小角速度（rad/s）
    # ---- 死锁脱困 ----
    apf_orca_deadlock_enabled: true         # 近距长时间不分离时启用脱困模式
    apf_orca_deadlock_distance: 1.0         # 脱困触发距离（米）
    apf_orca_deadlock_hold_time: 3.0        # 近距持续时长超过该值触发脱困（秒）
    apf_orca_deadlock_turn_boost: 0.08      # 脱困附加转向增量（rad/s）
    apf_orca_deadlock_speed_reduction: 0.10 # 脱困附加减速量（m/s）
    # ---- 虚拟走廊（降低轨迹重合） ----
    apf_orca_lane_guidance_enabled: true    # 启用虚拟通行走廊
    apf_orca_lane_guidance_distance: 2.5    # 走廊引导触发距离（米）
    apf_orca_lane_offset: 1.0               # 目标横向偏移（米）
    apf_orca_lane_gain: 0.20                # 走廊横向误差转向增益
    # ---- 同轨防陷入（优先让速） ----
    apf_orca_overlap_guard_enabled: true    # 同轨迹跟随防陷入
    apf_orca_overlap_ahead_distance: 2.2    # 邻船在前触发距离（米）
    apf_orca_overlap_lateral_threshold: 0.8 # 同车道判定横向阈值（米）
    apf_orca_overlap_speed_cut: 0.06        # 防陷入附加减速量（m/s）
    apf_orca_overlap_turn_scale: 0.85       # 防陷入时转向缩放（0~1）
    # ---- 伴行耦合保护 ----
    apf_orca_coupling_guard_enabled: true   # 长时间近距同向伴行时触发解耦
    apf_orca_coupling_distance: 1.4         # 伴行耦合判定距离阈值（米）
    apf_orca_coupling_release_distance: 2.0 # 解耦释放距离阈值（米，带迟滞）
    apf_orca_coupling_lateral_threshold: 0.60  # 伴行耦合横向重合阈值（米）
    apf_orca_coupling_rel_speed_max: 0.18   # 相对速度小于该值才认为"伴行锁定"（m/s）
    apf_orca_coupling_hold_time: 4.5        # 满足伴行条件持续该时长后触发解耦（秒）
    apf_orca_coupling_speed_min: 0.20       # 双船速度都高于该值才判定"推着走"（m/s）
    apf_orca_coupling_speed_cut: 0.08       # 解耦时附加减速量（m/s）
    apf_orca_coupling_turn_boost: 0.18      # 解耦时附加转向增量（rad/s）
    apf_orca_coupling_lane_push: 0.14       # 解耦时横向分离推力（rad/s）
    # ---- CPA / TCPA 预测风险加权 ----
    apf_orca_cpa_enabled: true              # 启用 CPA/TCPA 预测风险加权
    apf_orca_cpa_distance_threshold: 1.2    # CPA 风险阈值（米）
    apf_orca_tcpa_threshold: 6.0            # TCPA 风险阈值（秒）
    # ---- 预测性早避让 ----
    apf_orca_predictive_early_enabled: true # 提前轻微转向与减速
    apf_orca_predictive_tcpa_threshold: 18.0  # 预测 TCPA 阈值（秒）↑：更早进入预测规避
    apf_orca_predictive_cpa_threshold: 3.0  # 预测 CPA 阈值（米）↑：更早识别潜在碰撞
    apf_orca_predictive_max_distance: 6.0   # 提前介入的最远距离（米）
    apf_orca_predictive_angular_max: 0.16   # 提前转向最大增量（rad/s）↑：增强预转向可见性
    apf_orca_swarm_companion_entry_distance: 2.8  # 集群伴行在该距离外不进入重 ORCA 接管
    apf_orca_swarm_companion_heading_deg: 25.0    # 判定同航向/同走廊的航向容差（度）
    apf_orca_swarm_companion_lateral_threshold: 1.2  # 并行伴行横向阈值（米）
    apf_orca_swarm_follow_lateral_threshold: 0.7   # 跟驰同车道横向阈值（米）
    apf_orca_swarm_follow_distance: 3.0            # 跟驰前向距离阈值（米）
    apf_orca_swarm_rel_speed_max: 0.22             # 伴行/跟驰最大相对速度（m/s）
    apf_orca_swarm_merge_heading_deg: 35.0         # 路径交汇判定最小航向差（度）
    apf_orca_swarm_merge_tcpa_threshold: 8.0       # 路径交汇判定 TCPA 阈值（秒）
    apf_orca_swarm_merge_dcpa_threshold: 1.6       # 路径交汇判定 DCPA 阈值（米）
    apf_orca_predictive_speed_cut_max: 0.04 # 提前减速最大增量（m/s）↓：更偏向提前转向而非过早掉速
    apf_orca_side_effectiveness_enabled: true     # 启用选边有效性判据与自动换边重试
    apf_orca_side_effectiveness_window: 2.0       # 有效性评估窗口（秒）↓：更快判定是否换边
    apf_orca_side_effectiveness_min_sep_gain: 0.25  # 窗口内最小分离距离增益阈值（米）
    apf_orca_side_effectiveness_min_cpa_gain: 0.20  # 窗口内最小 CPA 改善阈值（米）
    apf_orca_side_switch_cooldown: 2.0            # 自动换边冷却时间（秒）
    apf_orca_side_switch_max_retries: 2           # 每次近距接触最大自动换边次数
    apf_orca_side_switch_turn_boost: 0.12         # 触发换边当拍附加转向增量（rad/s）
    # ---- 紧急增益 ----
    apf_orca_urgency_scale_max: 2.0         # 高风险时角速度放大上限
    apf_orca_linear_slowdown_max: 0.08      # 高风险时线速度附加减速上限（m/s）
    apf_orca_close_closing_turn_boost: 0.18 # 近距快速逼近时额外转向增量（rad/s）
    apf_orca_close_closing_speed_cut: 0.08  # 近距快速逼近时附加减速量（m/s）
    apf_orca_persistent_close_timeout: 18.0 # 长时间近距但未分离的提前脱困触发时长（秒）
    apf_orca_escape_enabled: false          # 默认关闭 ORCA 脱困，避免集群中被脱困机制放大振荡
    apf_orca_turning_hard_brake_relax_enabled: true  # 已建立稳定转向时放宽硬刹车触发
    apf_orca_turning_hard_brake_scale: 0.82 # 转向有效时硬刹车距离缩放
    apf_orca_turning_hard_brake_min_speed: 0.08  # 转向有效时硬刹车最低保速（m/s）
    # ---- 转向预算保护 ----
    apf_orca_turn_budget_enabled: true      # 基础转向接近饱和时抑制同向避让增量
    apf_orca_turn_budget_ratio: 0.85        # 判定"接近饱和"的基础角速度比例
    apf_orca_turn_budget_same_side_scale: 0.25  # 接近饱和时同向避让增量最小保留比例
    # ---- 智能选边 ----
    apf_orca_smart_side_enabled: true       # 基于短时预测分离效果自动选择左右避让方向
    apf_orca_smart_side_horizon: 2.5        # 智能选边预测时域（秒）
    apf_orca_smart_side_ref_yaw_rate: 0.25  # 评估参考转向角速度（rad/s）
    apf_orca_smart_side_clearance_weight: 1.2   # 分离距离收益权重
    apf_orca_smart_side_colreg_weight: 0.5      # 规则偏置权重（对遇/右舷来船）
    apf_orca_smart_side_goal_weight: 0.3        # 基础导航转向冲突惩罚权重
    # ---- 健康监测 ----
    apf_health_monitor_enabled: true        # 启用在线数据健康监测（位姿冻结检测）
    apf_health_freeze_pos_epsilon: 0.01     # 判定“位姿冻结”的位置变化阈值（米）
    apf_health_min_speed_for_freeze: 0.15   # 仅当速度超过该阈值才判定冻结异常（m/s）
    apf_health_own_freeze_warn_duration: 0.8      # 本船冻结持续告警阈值（秒）
    apf_health_neighbor_freeze_warn_duration: 0.8 # 邻船冻结持续告警阈值（秒）
    apf_health_warn_interval: 2.0           # 同类健康告警最小间隔（秒）
    # ---- 到点削弱 ----
    apf_goal_slow_speed_threshold: 0.40     # 到点削弱阈值（m/s）（测试验证值）
    apf_goal_relax_min_scale: 0.20          # 到点最小保留比例（0~1）


# =============================================================================
# APF 实测记录模板（Gazebo: usv_02 + usv_03）
# 使用方法：
# 1) 每次只改 1~2 个参数，保留其余参数不变
# 2) 每轮测试至少跑 3 次，记录平均值与最差值
# 3) 达到"无抖振 + 可到点 + 保持最小安全间距"再进入下一轮
# -----------------------------------------------------------------------------
# 推荐启动（示例）：
#   终端1: ros2 launch gs_bringup gs_launch.py enable_domain_bridge:=true enable_apf_neighbor_relay:=true
#   终端2: ros2 launch usv_sim sitl_launch.py namespace:=usv_02
#   终端3: ros2 launch usv_sim sitl_launch.py namespace:=usv_03
# -----------------------------------------------------------------------------
# 记录表（复制这一段作为每轮日志模板）：
# [Round X]
# - 变更参数:
#   apf_safe_distance =
#   apf_repulsion_gain =
#   apf_lateral_to_yaw_gain =
#   apf_max_linear_correction =
#   apf_max_angular_correction =
#   apf_goal_slow_speed_threshold =
#   apf_goal_relax_min_scale =
#
# - 测试场景:
#   1) 对向会船
#   2) 同向追越
#   3) 交叉汇入（45°/90°）
#
# - 关键观测指标（每次都要填）:
#   min_distance_m =                 # 两船最小间距（建议目标 >= 1.5m）
#   goal_reach_success_rate =        # 到点成功率（建议目标 >= 95%）
#   mean_arrival_time_s =            # 平均到点时间
#   max_yaw_rate_abs =               # 最大角速度绝对值（看是否过激）
#   oscillation_observed =           # 是否出现蛇形抖动（yes/no）
#   deadlock_observed =              # 是否出现互相顶住不前（yes/no）
#
# - 结果判定:
#   stable =                         # yes/no
#   next_action =                    # 增大/减小哪个参数，原因是什么
# -----------------------------------------------------------------------------
# 快速调参建议（出现问题时优先顺序）：
# - 蛇形/抖动明显：先 ↓ apf_lateral_to_yaw_gain，再 ↓ apf_repulsion_gain
# - 避让不积极：先 ↑ apf_repulsion_gain，再 ↑ apf_safe_distance
# - 临近目标推不开：↑ apf_goal_slow_speed_threshold 或 ↓ apf_goal_relax_min_scale
# - 急刹车太明显：↓ apf_max_linear_correction
# - 摆头太猛：↓ apf_max_angular_correction
# =============================================================================
