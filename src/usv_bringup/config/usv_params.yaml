# USV系统参数配置文件
# 该文件定义了USV系统中各节点的参数配置
# =============================================================================

# =============================================================================
# 飞控通信模块参数 (MAVROS)
# 
# 多 USV 机载计算机的 system_id 配置说明:
# 
# 场景: 多台独立 USV,每台有自己的机载计算机(gauss02/gauss03)和飞控
# 
# system_id 设置原则:
# 1. 每个机载计算机使用唯一的 system_id (推荐: usv_02用2, usv_03用3)
# 2. 所有飞控统一使用 system_id=1 (ArduPilot 标准)
# 3. 地面站使用 system_id=255 (GCS 标准)
# 
# MAVLink 路由工作原理:
# - 飞控会记住"从哪个串口收到哪个 sysid 的消息"
# - 当收到目标为某 sysid 的消息时,飞控会转发到对应串口
# - 这样地面站(sysid=255)可以通过飞控与机载电脑(sysid=2/3)通信
# 
# ⚠️ 关键: target_system_id 必须设为 1 (飞控ID),否则无法接收飞控心跳!
# =============================================================================
mavros:
  ros__parameters:
    # ==================== MAVLink 身份配置 ====================
    # 注意: system_id/target_system_id 等参数已移至 launch 文件中配置
    # 请在 usv_launch.py 中修改 target_system_id:
    # - usv_02: target_system_id = 2 (匹配飞控 SYSID_THISMAV=2)
    # - usv_03: target_system_id = 3 (匹配飞控 SYSID_THISMAV=3)
    
    # ==================== 插件配置（已移至 launch 文件）====================
    # ⚠️ 插件黑名单配置已移至 usv_launch.py，此处配置已失效
    # 请在 launch 文件中修改 plugin_blacklist 参数
    # 
    # 保留的核心插件（15个）：
    # sys_status, sys_time, command, local_position, global_position,
    # home_position, gps_status, battery, imu, rc_io, setpoint_raw,
    # waypoint, rallypoint, geofence, vfr_hud
    
    # ==================== 性能优化参数（已移至 launch 文件）====================
    # 以下参数已在 launch 文件中配置，此处保留仅作为文档参考
    # sys.disable_diag: true
    # mission.pull_after_gcs: false
    # waypoint.pull_after_gcs: false
    # rallypoint.pull_after_gcs: false
    # geofence.pull_after_gcs: false
    
    # 连接参数（保留作为默认值）
    conn:
      timeout: 10.0                         # 连接超时时间（秒）
      heartbeat_mav_type: 6                 # MAV_TYPE_SURFACE_BOAT
      heartbeat_rate: 1.0                   # 心跳频率（Hz）
      
    # 视觉定位配置
    vision_pose:
      enable: false                         # 禁用视觉定位

# =============================================================================
# 通信与状态管理模块参数
# =============================================================================
/**/usv_status_node:
  ros__parameters:
    # 电池电压范围配置（基于实际电池特性）
    battery_voltage_full: 12.6              # 满电电压（V）- 电量显示100%
    battery_voltage_empty: 10.8             # 空电电压（V）- 电量显示0%，需要充电

# NavigateToPoint 话题版本节点参数（launch 实际启动的节点名为 navigate_to_point_node）
# ⚠️ 阈值参数说明：nav_arrival_threshold 与 velocity_controller_node.goal_tolerance 已自动同步
#    当通过话题 set_nav_arrival_threshold 设置时，两个节点会同时更新
/**/navigate_to_point_node:
  ros__parameters:
    nav_arrival_threshold: 1.5              # 最终到达目标点的距离阈值（米）- 与 velocity_controller.goal_tolerance 同步
    nav_switch_threshold: 1.5               # 平滑导航时切换下一个航点的距离阈值（米）
                                            # 调参建议 (避免中间航点停顿):
                                            #   - 仍有停顿 → 调大到 2.0~3.0
                                            #   - 切弯过早/掉点 → 保持 1.5 或更小
    nav_smooth_navigation: true             # 是否启用平滑导航模式（连续追踪不停顿）
    nav_feedback_period: 0.2                # 反馈发布周期（秒）
    distance_mode: '2d'                     # 距离计算模式：'2d'（仅XY平面）或 '3d'（包含Z轴）
    waypoint_queue_size: 10                 # 航点队列大小（支持预发送）
    idle_timeout_sec: 30.0                  # 空闲保护超时时间（秒）- 队列空且无新航点时告警
    idle_protection_enabled: true           # 是否启用空闲保护

# Auto Set Home 参数（关键：延长 GPS 初始化时间，避免 z 坐标误差）
/**/auto_set_home_node:
  ros__parameters:
    set_delay_sec: 10.0                     # GPS 高度收敛等待时间（秒），建议 8-15 秒
    use_current_gps: true                   # 使用当前 GPS 位置作为 Home 点

# =============================================================================
# GPS 坐标转换模块参数（统一的 GPS 原点配置）
# 
# ⚠️ 重要说明：
# 所有 USV 使用统一的 GPS 原点（A0 基站）进行坐标转换
# - gps_to_local_node: 将飞控的 GPS 位置转换为本地 XYZ 坐标
# - coord_transform_node: 将地面站的 XYZ 目标点转换为 GPS 坐标
# 
# GPS 原点（A0 基站）：22.5180977°N, 113.9007239°E, -5.17m
# =============================================================================

/**/gps_to_local_node:
  ros__parameters:
    gps_origin_lat: 22.5180977              # 北纬（度）
    gps_origin_lon: 113.9007239             # 东经（度）
    gps_origin_alt: 0.0                     # 海拔（米，A0 基站实测值）
    publish_rate: 10.0                      # 发布频率（Hz），推荐 10-20 Hz
    enable_gps_to_local: true               # 启用 GPS→本地坐标转换
    # UWB/伪卫星坐标系偏移角（度）
    # 定义：UWB X轴 与 地磁东 的夹角（逆时针为正）
    # 例如：如果 UWB X轴 指向地磁北偏东30°，则设置为 60°
    # 设置为 0 表示 UWB X轴 与地磁东对齐（标准 ENU）
    coordinate_yaw_offset_deg: 0.0

/**/coord_transform_node:
  ros__parameters:
    gps_origin_lat: 22.5180977              # 北纬（度）
    gps_origin_lon: 113.9007239             # 东经（度）
    gps_origin_alt: 0.0                     # 海拔（米，A0 基站实测值）
    enable_coord_transform: true            # 启用 XYZ→GPS 坐标转换（接收地面站+避障目标点）
    use_global_position_target: true        # true=GlobalPositionTarget (推荐), false=GeoPoseStamped

# =============================================================================
# 控制模块参数
# =============================================================================
/**/usv_avoidance_node:
  ros__parameters:
    # 避障距离参数
    in_distance_value: 1.0                  # 避障触发距离（米）

/**/usv_command_node:
  ros__parameters:
    # 支持的飞行模式列表
    supported_modes: ['GUIDED', 'MANUAL', 'AUTO', 'HOLD', 'ARCO', 'STEERING','RTL']
    # 服务超时时间
    service_timeout_sec: 5.0                # 服务等待超时时间（秒）
    # 解锁命令超时时间
    arming_command_timeout_sec: 10.0        # 解锁命令超时时间（秒）

/**/usv_control_node:
  ros__parameters:
    publish_rate: 20.0                      # 目标点发布频率（Hz）
    frame_id: 'map'                         # 坐标系ID
    coordinate_frame: 8                     # FRAME_LOCAL_NED = 8
    enable_local_control: false             # 是否启用局部控制（false=使用coord_transform_node的全局GPS模式）
    # 控制模式: 'position' (GPS位置模式) 或 'velocity' (速度模式，由velocity_controller_node处理)
    # 速度模式可彻底解决航点附近减速问题
    control_mode: 'velocity'                # 🔧 已切换为速度模式，使用 velocity_controller_node

# =============================================================================
# 速度控制器参数 (MPC 模型预测控制)
# 
# 使用说明:
# 1. 将 usv_control_node.control_mode 设置为 'velocity' 启用速度模式
# 2. 启动 velocity_controller_node 节点
# 3. 速度模式下，导航目标仍发送到 set_usv_nav_goal，但由 velocity_controller_node 处理
# 
# 优势:
# - 预测未来轨迹，消除蛇形震荡
# - 平滑的控制输出，保护舵机
# - 直接处理运动学约束
# =============================================================================
/**/velocity_controller_node:
  ros__parameters:
    # 控制模式 (必须与 usv_control_node.control_mode 一致)
    control_mode: 'velocity'                # 'position' 或 'velocity'
    
    # ==================== MPC 参数 (模型预测控制) ====================
    # 参数调整历史 (注意: YAML参数会覆盖Python默认值):
    # 
    # v1 (1/30): q_pos=30, q_theta=5, r_w=8, r_dw=5(默认), w_max=0.4
    #            结果: 航向误差std=39.3°, 振荡频率=0.39Hz → 大振幅低频振荡
    # 
    # v2 (2/02): q_pos=30, q_theta=5, r_w=8, r_dw=20(代码修改), w_max=0.4
    #            结果: 航向误差std=17.8°(↓55%), 振荡频率=0.47Hz(↑19%)
    #            分析: r_dw↑ 限制角加速度变化 → 振幅↓频率↑
    # 
    # v3 (2/03 AM): q_pos=5, q_theta=8, r_w=10, r_dw=15, w_max=0.3
    #               结果: 角速度饱和54.2%, 方向反转0.30Hz, 横向偏差±1.2m
    #               问题: Q_pos太小导致纠偏不及时, w_max太小导致控制器受限
    # 
    # v4 (2/03 PM): q_pos=10, q_theta=12, r_w=6, r_dw=12, w_max=0.5
    #               问题: 仍有S形振荡! 根本原因是 Unicycle 模型与实船不匹配
    #
    # ========== v5 (2/03): 一阶惯性转向模型 - 根治S形振荡 ==========
    # 核心改进:
    #   1. 状态扩展: [x,y,θ] → [x,y,θ,ω_actual] (4维)
    #   2. 动力学: θ̇=ω_cmd → θ̇=ω_actual, τ·ω̇+ω=ω_cmd
    #   3. 代价: 点对点 → CTE + 航线方向
    #
    # 新参数说明:
    #   tau_omega: 转向时间常数 (秒), 模拟船的转向惯性
    #              - 船从发出命令到实际角速度达到63.2%的时间
    #              - 推荐 0.3~0.6, 越大预测转向越慢
    #   q_cte:     Cross Track Error权重, 控制横向偏差
    #              - 推荐 10.0~30.0, 越大走线越精确
    #
    mpc_prediction_steps: 20                # 预测步数 N (dt=0.1s, N=20 -> 预测2.0秒)
    mpc_weight_pos: 10.0                    # Q_pos: 沿航线进度权重
    mpc_weight_heading: 3.0                 # Q_theta: 航向误差权重 (v12: 5→3, 不急于修正航向)
    mpc_weight_steering: 60.0               # R_w: 角速度惩罚 (v14: 全船统一)
    mpc_weight_steering_rate: 120.0         # R_dw: 角加速度惩罚 (v14: 100→120, 全船统一, 极平滑角速度变化率)
    
    # v5 新增参数 (一阶惯性转向模型)
    mpc_tau_omega: 0.4                      # 转向时间常数 (秒) - 核心参数!
                                            # 调参建议:
                                            #   - 还在画龙 → 调大到 0.5~0.6
                                            #   - 响应迟钝 → 调小到 0.3
    mpc_weight_cte: 3.0                     # Cross Track Error权重 (v12: 5→3, 慢慢修正即可,不追求精确跟线)
                                            # 调参建议:
                                            #   - 横向偏差大 → 调大到 5~8
                                            #   - 轨迹不平滑 → 调小到 2~3
    
    # ========== v6 (2/04): 速度自适应 tau_omega - 根治低速S形振荡 ==========
    # 核心原理:
    #   - 船舶转向响应与速度相关: 高速时舵效好(tau小), 低速时舵效差(tau大)
    #   - 使用固定 tau_omega 会导致低速时模型失配 → S形振荡
    #   - 自适应 tau_omega 使同一套参数适用于所有船只，无需单独调参
    #
    # 参数说明:
    #   adaptive_tau_enabled: 启用速度自适应 tau_omega
    #   tau_omega_low_speed: 低速时的 tau_omega (船转向慢, tau 大)
    #   tau_omega_high_speed: 高速时的 tau_omega (船转向快, tau 小)
    #   tau_speed_threshold_low/high: 低/高速阈值
    #
    adaptive_tau_enabled: true              # 启用速度自适应 tau_omega (推荐开启)
    tau_omega_low_speed: 0.8                # 低速时 tau_omega (秒)
    tau_omega_high_speed: 0.4               # 高速时 tau_omega (秒)
    tau_speed_threshold_low: 0.20           # 低速阈值 (m/s)
    tau_speed_threshold_high: 0.50          # 高速阈值 (m/s)
    
    # ==================== 速度参数 ====================
    cruise_speed: 0.30                      # 巡航速度（m/s）(v14: 0.35→0.30, 全船统一)
    max_angular_velocity: 0.40              # 最大角速度（rad/s）(v14: 全船统一)
    min_speed: 0.25                         # 最小速度（m/s）(v14: 全船统一, 允许更低速转弯)
    
    # ==================== 到达判断 ====================
    # ⚠️ 这两个参数与 navigate_to_point_node 的阈值通过话题自动同步
    #    运行时通过 set_nav_arrival_threshold / set_nav_switch_threshold 话题统一设置
    goal_tolerance: 1.5                   # 最终航点到达阈值（米）- 同步自 nav_arrival_threshold
    switch_tolerance: 1.5                   # 中间航点切换阈值（米）- 同步自 nav_switch_threshold
    
    # ==================== 控制参数 ====================
    control_rate: 20.0                      # 控制频率（Hz）
    angular_velocity_filter: 0.4            # 角速度滤波基础系数（自适应范围 0.3-0.7）
    
    # ==================== 安全参数 ====================
    require_guided_mode: true               # 是否需要GUIDED模式
    require_armed: true                     # 是否需要解锁
    
    # ==================== L1风格航向估计参数 ====================
    use_velocity_based_heading: true        # 启用速度方向航向估计（推荐）
    min_speed_for_velocity_heading: 0.2    # 使用速度航向的最小速度（m/s）
    
    # ========== v8 (2/09): AMPC 自适应MPC - 在线辨识 tau_omega ==========
    # 核心原理:
    #   1. 航向速率观测器: 从实测航向变化估计 ω_actual (替代 MPC 自预测)
    #      打破 "模型失配 → 错误预测 → 问题放大" 的正反馈循环
    #   2. RLS 在线辨识: 每艘船的真实 τ_omega 自动估计
    #      消除逐船手工调参需求
    #   3. 饱和感知: 持续饱和时自动增大 τ 帮助脱出
    #
    # 优势:
    #   - 所有 USV 使用相同参数，自动适应各船的硬件差异
    #   - 自动适应时变条件 (电池衰减/水流/蝇旋桨缠绕)
    #   - ampc_enabled=false 时退化为标准 MPC v5 + v6 速度自适应
    #
    ampc_enabled: true                      # 启用 AMPC 在线辨识 (推荐 true)
    ampc_rls_forgetting_factor: 0.995       # RLS 遗忘因子 λ (v11: 0.99→0.995, 更长记忆让τ收敛更稳定)
                                            #   越小 → 适应越快但越吵
                                            #   越大 → 越稳定但适应越慢
    ampc_heading_observer_alpha: 0.08       # 航向速率滤波系数 (v12: 0.12→0.08, 航向噪声0.29仍高,加强滤波)
                                            #   越大 → 跟踪越快但越吵
                                            #   越小 → 越平滑但延迟越大
    ampc_tau_min: 0.30                      # τ 估计下限 (秒) (v13: 0.15→0.30, τ连续3次打下限! 强制MPC保守预测转向)
    ampc_tau_max: 1.5                       # τ 估计上限 (秒) (v9b: 3.0→1.5, USV真实τ不超过1.5s)
    ampc_rebuild_threshold: 0.15            # τ 变化超此比例才重建 MPC
    ampc_saturation_tau_boost: 1.02          # 慢性饱和时 τ 升压因子 (v9b: 1.15→1.02, 让RLS自行辨识)

    # ==================== 分布式 APF 多船避碰 ====================
    # 设计目标: 不替换现有MPC导航，仅在局部近距离叠加排斥修正
    # 建议启用步骤:
    # 1) 先保持 apf_enabled=false 回归验证
    # 2) 打开后从小增益开始 (apf_repulsion_gain=0.6~0.8)
    # 3) 逐步增大安全半径和修正限幅
    apf_enabled: true
    apf_use_fleet_neighbors_topic: true
    apf_fleet_neighbors_topic: 'apf/neighbors'
    # 邻船位姿话题列表(绝对话题名). 每艘USV请填“其他船”话题,不要包含本船。
    # 示例(以 usv_02 为例): ['/usv_01/local_position/pose_from_gps', '/usv_03/local_position/pose_from_gps']
    apf_neighbor_pose_topics: []
    apf_safe_distance: 1.0                  # APF 生效半径 (m)
    apf_repulsion_gain: 0.7                 # 排斥增益 η（SITL 验证值）
    apf_lateral_to_yaw_gain: 1.2            # 横向排斥 → 角速度映射增益（SITL 验证值）
    apf_max_linear_correction: 0.20         # 线速度修正限幅 (m/s)
    apf_max_angular_correction: 0.45        # 角速度修正限幅 (rad/s)
    apf_neighbor_timeout: 0.8               # 邻船位姿超时剔除 (s)
    apf_orca_enabled: true                  # 启用 ORCA 风格速度障碍修正（优先于传统 APF）
    apf_orca_time_horizon: 10.0             # ORCA 时间地平线 T (s)
    apf_orca_min_separation: 2.0            # ORCA 最小分离距离 (m)
    apf_orca_influence_distance: 8.0        # ORCA 邻船影响距离上限 (m)
    # ---- 侧承诺（打破对称避让） ----
    apf_orca_side_commit_enabled: true      # 交汇时启用固定左右承诺
    apf_orca_commit_policy: starboard       # 对遇优先右舷规避（两船都向右转）
    apf_orca_side_commit_distance: 1.5      # 触发左右承诺距离（米）
    apf_orca_side_commit_hold_time: 2.5     # 左右承诺保持时间（秒）
    apf_orca_side_bias_lateral: 0.20        # 左右承诺附加转向偏置（rad/s）
    apf_orca_min_angular_near: 0.12         # 超近距最小角速度下限（rad/s）
    apf_orca_min_angular_distance: 0.7      # 触发最小角速度下限距离（米）
    apf_orca_near_apf_fallback_enabled: true  # 超近距叠加 APF 兜底
    apf_orca_near_apf_distance: 0.8         # APF 兜底触发距离（米）
    apf_orca_near_apf_weight: 1.0           # APF 兜底权重
    apf_orca_enforce_commit_direction: true  # 承诺生效时强约束最终角速度方向
    apf_orca_enforce_min_angular: 0.12      # 方向强约束最小角速度（rad/s）
    # ---- 共同转向（近距双边分担） ----
    apf_orca_shared_turn_enabled: true      # 近距时双方都承担最小转向份额
    apf_orca_shared_turn_distance: 1.2      # 双边分担触发距离（米）
    apf_orca_shared_turn_min_angular: 0.24  # 双边分担最小角速度（rad/s）
    # ---- 死锁脱困 ----
    apf_orca_deadlock_enabled: true         # 近距长时间不分离时启用脱困模式
    apf_orca_deadlock_distance: 1.0         # 脱困触发距离（米）
    apf_orca_deadlock_hold_time: 3.0        # 近距持续时长超过该值触发脱困（秒）
    apf_orca_deadlock_turn_boost: 0.08      # 脱困附加转向增量（rad/s）
    apf_orca_deadlock_speed_reduction: 0.10 # 脱困附加减速量（m/s）
    # ---- 虚拟走廊（降低轨迹重合） ----
    apf_orca_lane_guidance_enabled: true    # 启用虚拟通行走廊
    apf_orca_lane_guidance_distance: 2.5    # 走廊引导触发距离（米）
    apf_orca_lane_offset: 1.0               # 目标横向偏移（米）
    apf_orca_lane_gain: 0.20                # 走廊横向误差转向增益
    # ---- 同轨防陷入（优先让速） ----
    apf_orca_overlap_guard_enabled: true    # 同轨迹跟随防陷入
    apf_orca_overlap_ahead_distance: 2.2    # 邻船在前触发距离（米）
    apf_orca_overlap_lateral_threshold: 0.8 # 同车道判定横向阈值（米）
    apf_orca_overlap_speed_cut: 0.06        # 防陷入附加减速量（m/s）
    apf_orca_overlap_turn_scale: 0.85       # 防陷入时转向缩放（0~1）
    # ---- 伴行耦合保护 ----
    apf_orca_coupling_guard_enabled: true   # 长时间近距同向伴行时触发解耦
    apf_orca_coupling_distance: 1.2         # 伴行耦合判定距离阈值（米）
    apf_orca_coupling_release_distance: 1.6 # 解耦释放距离阈值（米，带迟滞）
    apf_orca_coupling_lateral_threshold: 0.45  # 伴行耦合横向重合阈值（米）
    apf_orca_coupling_rel_speed_max: 0.12   # 相对速度小于该值才认为"伴行锁定"（m/s）
    apf_orca_coupling_hold_time: 8.0        # 满足伴行条件持续该时长后触发解耦（秒）
    apf_orca_coupling_speed_min: 0.20       # 双船速度都高于该值才判定"推着走"（m/s）
    apf_orca_coupling_speed_cut: 0.12       # 解耦时附加减速量（m/s）
    apf_orca_coupling_turn_boost: 0.10      # 解耦时附加转向增量（rad/s）
    apf_orca_coupling_lane_push: 0.10       # 解耦时横向分离推力（rad/s）
    # ---- CPA / TCPA 预测风险加权 ----
    apf_orca_cpa_enabled: true              # 启用 CPA/TCPA 预测风险加权
    apf_orca_cpa_distance_threshold: 1.2    # CPA 风险阈值（米）
    apf_orca_tcpa_threshold: 6.0            # TCPA 风险阈值（秒）
    # ---- 预测性早避让 ----
    apf_orca_predictive_early_enabled: true # 提前轻微转向与减速
    apf_orca_predictive_tcpa_threshold: 18.0  # 预测 TCPA 阈值（秒）
    apf_orca_predictive_cpa_threshold: 3.0  # 预测 CPA 阈值（米）
    apf_orca_predictive_max_distance: 6.0   # 提前介入的最远距离（米）
    apf_orca_predictive_angular_max: 0.16   # 提前转向最大增量（rad/s）
    apf_orca_predictive_speed_cut_max: 0.10 # 提前减速最大增量（m/s）
    # ---- 紧急增益 ----
    apf_orca_urgency_scale_max: 2.0         # 高风险时角速度放大上限
    apf_orca_linear_slowdown_max: 0.12      # 高风险时线速度附加减速上限（m/s）
    # ---- 转向预算保护 ----
    apf_orca_turn_budget_enabled: true      # 基础转向接近饱和时抑制同向避让增量
    apf_orca_turn_budget_ratio: 0.85        # 判定"接近饱和"的基础角速度比例
    apf_orca_turn_budget_same_side_scale: 0.25  # 接近饱和时同向避让增量最小保留比例
    # ---- 智能选边 ----
    apf_orca_smart_side_enabled: true       # 基于短时预测分离效果自动选择左右避让方向
    apf_orca_smart_side_horizon: 2.5        # 智能选边预测时域（秒）
    apf_orca_smart_side_ref_yaw_rate: 0.25  # 评估参考转向角速度（rad/s）
    apf_orca_smart_side_clearance_weight: 1.2   # 分离距离收益权重
    apf_orca_smart_side_colreg_weight: 0.5      # 规则偏置权重（对遇/右舷来船）
    apf_orca_smart_side_goal_weight: 0.3        # 基础导航转向冲突惩罚权重
    # ---- 健康监测 ----
    apf_health_monitor_enabled: true        # 启用在线数据健康监测（位姿冻结检测）
    apf_health_freeze_pos_epsilon: 0.01     # 判定"位姿冻结"的位置变化阈值（米）
    apf_health_min_speed_for_freeze: 0.15   # 仅当速度超过该阈值才判定冻结异常（m/s）
    apf_health_own_freeze_warn_duration: 0.8      # 本船冻结持续告警阈值（秒）
    apf_health_neighbor_freeze_warn_duration: 0.8 # 邻船冻结持续告警阈值（秒）
    apf_health_warn_interval: 2.0           # 同类健康告警最小间隔（秒）
    # ---- 到点削弱 ----
    apf_goal_slow_speed_threshold: 0.40     # 到点削弱阈值（m/s）（SITL 验证值）
    apf_goal_relax_min_scale: 0.20          # 到点最小保留比例（0~1）

# =============================================================================
# 传感器驱动模块参数
# =============================================================================
/**/usv_uwb_node:
  ros__parameters:
    dummy_param: true                       # 占位参数

# =============================================================================
# 辅助功能模块参数
# =============================================================================
/**/usv_head_action_node:
  ros__parameters:
    # 默认为无硬件模式，避免在无 I2C/PCA9685 环境崩溃
    enable_head_actuator: true             # 设置为 true 以启用实际硬件控制

/**/usv_fan_node:
  ros__parameters:
    # 风扇控制引脚配置
    fan_pin: 17                             # BCM编号，GPIO17
    gpio_chip: gpiochip4                    # GPIO芯片名称
    # 温度阈值配置（单位：毫摄氏度）
    temp_threshold_on: 50000                # 风扇开启温度阈值 50°C
    temp_threshold_off: 45000               # 风扇关闭温度阈值 45°C

/**/usv_led_node:
  ros__parameters:
    # LED控制串口配置
    port: /dev/ttyUSB0                      # 串口设备路径
    baudrate: 115200                        # 波特率
    # LED效果配置
    color_list: [255, 0, 0, 255, 127, 0, 255, 255, 0, 0, 255, 0, 0, 255, 255, 0, 0, 255, 139, 0, 255]  # 颜色列表 [R,G,B,R,G,B,...]
    timer_period_high: 0.03                 # 高频定时器周期（秒）
    timer_period_low: 0.5                   # 低频定时器周期（秒）
    transition_duration: 3.0                # 颜色渐变持续时间（秒）
    hold_duration: 10.0                     # 颜色停留时间（秒）
    breath_step: 6                          # 呼吸灯步进值

/**/usv_sound_node:
  ros__parameters:
    # 声音播放配置  
    sound_types: ['gaga101', 'gaga102', 'gaga103', 'gaga104']  # 常规声音类型列表
    moon_type: 'moon101'                    # 低电量声音类型
    min_play_interval: 2                    # 最小播放间隔（秒）
    max_play_interval: 10                   # 最大播放间隔（秒）
    min_play_count: 1                       # 最小播放次数
    max_play_count: 3                       # 最大播放次数

