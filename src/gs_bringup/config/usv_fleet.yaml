# ==================== 启动选项 ====================
launch_options:
  # 是否使用本地模拟（不通过 SSH 启动，用于单机测试）
  use_local_simulation: false
  
  # SSH 连接超时（秒）
  ssh_timeout: 10.0
  
  # 启动间隔（秒，避免同时启动导致网络拥塞）
  launch_delay: 2.0
  
  # 是否显示远程节点的输出（true=转发到地面站终端）
  show_remote_output: true
  
  # 失败重试次数
  max_retries: 2

# ==================== 网络配置 ====================
network:
  # ROS_DOMAIN_ID（确保与地面站一致）
  ros_domain_id: 0
  
  # ROS 2 DDS 发现超时（秒）
  discovery_timeout: 30.0
